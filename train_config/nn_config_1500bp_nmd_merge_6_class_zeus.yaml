model:
  name: jaeger_nmd_merge
  experiment: nmd_merge
  seed: 425425
  classifier_out_dim: 6
  reliability_out_dim: 1
  base_dir: /mnt/beegfs/bioinf/wijesekara/jaeger/experiments
  class_label_map:
    - class: "bacteria"
      label: 0
    - class: "phage"
      label: 1
    - class: "eukarya"
      label: 2
    - class: "archaea"
      label: 3
    - class: "plasmid"
      label: 4
    - class: "virus"
      label: 5
  activation: gelu
  mode: training
  embedding:
    use_embedding_layer: true
    input_type: translated
    strands: 2
    frames: 6
    length: null
    input_shape:
      - 6
      - null
    embedding_size: 196
    embedding_regularizer: l2
    embedding_regularizer_w: 0.00001
  string_processor:
    # data_format: csv | numpy
    # csv: live preprocessing from CSV (default, backward compatible)
    # numpy: preprocessed NumPy .npz files (fastest, in-memory)
    data_format: numpy
    batching:
      strategy: grouped
      length_batch_sizes:
        500: 600
      default_batch_size: 128
    seq_onehot: false
    codon: CODON
    codon_id: CODON_ID
    # Single-crop training and validation
    # crop_size: 600
    # Multi-crop training, single-crop validation
    overlap: 0.5
    crop_sizes: [500]
    validation_crop_sizes: [500]
    validation_overlap: 0.5
    buffer_size: 5000
    shuffle: true
    reshuffle_each_iteration: true
    mutate: false
    mutation_rate: 0.1
    shuffle_frames: false
    masking: false
    classifier_labels:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
    classifier_labels_map:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
  representation_learner:
    hidden_layers:
      - name: masked_conv1d
        config:
          filters: 128
          kernel_size: 7
          strides: 1
          dilation_rate: 1
          use_bias: true
          activation: null
          kernel_regularizer: l2
          kernel_regularizer_w: 0.00001
      - name: nmd
      - name: masked_dyt
      - name: activation
        config:
          activation: gelu
      - name: residual_block # block 1
        config:
          use_1x1conv: false
          block_size: 2
          filters: 128
          kernel_size: 5
          dilation_rate: 3
          use_bias: true
          kernel_regularizer: l2
          kernel_regularizer_w: 0.00001
          norm_type: masked_dyt
      - name: nmd
      - name: masked_dyt
      - name: activation
        config:
          activation: gelu
      - name: residual_block # block 2
        config:
          use_1x1conv: false
          block_size: 2
          filters: 128
          kernel_size: 5
          dilation_rate: 3
          use_bias: true
          kernel_regularizer: l2
          kernel_regularizer_w: 0.00001
          norm_type: masked_dyt
      - name: nmd
      - name: masked_dyt
      - name: activation
        config:
          activation: gelu
      - name: residual_block
        config:
          use_1x1conv: false
          block_size: 2
          filters: 128
          kernel_size: 5
          dilation_rate: 3
          use_bias: true
          kernel_regularizer: l2
          kernel_regularizer_w: 0.00001
          norm_type: masked_dyt
      - name: nmd
      - name: masked_dyt
      - name: activation
        config:
          activation: gelu
    pooling: max
  classifier:
    input_shape: 128
    hidden_layers:
      - name: dropout
        config:
          rate: 0.1
      - name: dense
        config:
          units: 6
          activation: null
          dtype: float32
          use_bias: true
          kernel_regularizer: l2
          kernel_regularizer_w: 0.00001
  reliability_model:
    merge:
      mode: concat
      axis: -1
    input_shape: 512
    hidden_layers:
      - name: dropout
        config:
          rate: 0.3
      - name: dense
        config:
          units: 8
          activation: gelu
          use_bias: true
          kernel_regularizer: l2
          kernel_regularizer_w: 0.00001
      - name: dropout
        config:
          rate: 0.1
      - name: dense
        config:
          units: 1
          activation: null
          dtype: float32
          use_bias: true
          kernel_regularizer: l2
          kernel_regularizer_w: 0.05
training:
  data_dir: /mnt/beegfs/bioinf/wijesekara/jaeger/data/jaeger_train_data
  experiment_root: experiments/experiment_{{ model.experiment }}_{{ model.seed }}
  classifier_dir: "{{ model.base_dir }}/{{ training.experiment_root }}/checkpoints/classifier"
  reliability_dir: "{{ model.base_dir }}/{{ training.experiment_root }}/checkpoints/reliability"
  classifier_epochs: 20
  reliability_epochs: 10
  projection_epochs: 0
  classifier_train_steps: -1
  reliability_train_steps: -1
  classifier_validation_steps: -1
  reliability_validation_steps: -1

  reliability_data_generation:
    raw_csv_paths:
      train: "{{ training.data_dir }}/train_data_2000.csv"
      val: "{{ training.data_dir }}/val_data_2000.csv"
    output_dir: "{{ training.data_dir }}/reliability_data"
    crop_sizes: [500]
    units: codon
    synthetic_ood_multiplier: 1.0
    perturbations:
      shuffle:
        enabled: true
        mode: dinuc
      subseq_repeat:
        enabled: true
        window_fraction: 0.25
      tandem_repeat:
        enabled: true
        motif_length_range: [3, 10]
        window_fraction: 0.25
        num_repeats: 20
      mix: true

  batch_size: 128
  optimizer: adamw
  optimizer_params:
    learning_rate: 0.0003
    clipnorm: 1
  loss_classifier: categorical_crossentropy
  loss_params_classifier:
    from_logits: true
  classifier_class_weights:
    0: 1
    1: 1
    2: 1
    3: 1
    4: 1
    5: 1
  loss_reliability: binary_crossentropy
  loss_params_reliability:
    from_logits: true
  metrics_classifier:
    - name: categorical_accuracy
      params: null
  metrics_reliability:
    - name: binary_accuracy
      params: null
    - name: auc
      params: null
  callbacks:
    clean_old: true
    directories:
      - "{{ model.base_dir }}/{{ training.experiment_root }}/checkpoints/classifier"
    classifier:
      - name: EarlyStopping
        params:
          monitor: val_loss
          patience: 3
          mode: min
          restore_best_weights: true
      - name: ModelCheckpoint
        params:
          filepath: "{{ model.base_dir }}/{{ training.experiment_root }}/checkpoints/classifier/epoch:{epoch:02d}-loss:{val_loss:.2f}.weights.h5"
          monitor: val_loss
          mode: min
          save_weights_only: true
          verbose: 1
          save_best_only: false
      - name: ReduceLROnPlateau
        params:
          monitor: val_loss
          patience: 2
          factor: 0.5
          min_lr: 0.00001
      - name: SyncTerminateOnNaN
      - name: CSVLogger
        params:
          filename: "{{ model.base_dir }}/{{ training.experiment_root }}/checkpoints/classifier/training.log"
          separator: ","
          append: true
  model_saving:
    path: "{{ model.base_dir }}/{{ training.experiment_root }}/model"
    save_weights: true
    save_exec_graph: true
  fragment_classifier_data:
    train:
      - class:
          - bacteria
          - phage
          - eukarya
          - virus
          - archaea
          - plasmid
        path:
          - "{{ training.data_dir }}/numpy/train_data_1800bp_translated.npz"
        label:
          - 0
          - 1
          - 2
          - 3
          - 4
          - 5
    validation:
      - class:
          - bacteria
          - phage
          - eukarya
          - virus
          - archaea
          - plasmid
        path:
          - "{{ training.data_dir }}/numpy/val_data_1800bp_translated.npz"
        label:
          - 0
          - 1
          - 2
          - 3
          - 4
          - 5
  fragment_reliability_data:
    train:
      - class:
          - ood
          - indist
        path:
          - "{{ training.data_dir }}/train_shuffled_ood_translated.npz"
        label:
          - 0
          - 1
    validation:
      - class:
          - ood
          - indist
        path:
          - "{{ training.data_dir }}/val_shuffled_ood_translated.npz"
        label:
          - 0
          - 1
