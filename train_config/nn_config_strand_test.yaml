# Minimal config for strand awareness test (baseline vs shuffle_frames)
# Uses 4-class genomad data: chromosome(0), virus(1), plasmid(2), euk(3)

model:
  name: "jaeger_strand_test"
  experiment: 1
  seed: 42
  classifier_out_dim: 4
  reliability_out_dim: 1
  base_dir: "/home/yasas-wijesekara/ssd/Projects/Jaeger_revisions/training/genomad_train_data/jaeger_format"
  class_label_map:
  - class: "chromosome"
    label: 0
  - class: "virus"
    label: 1
  - class: "plasmid"
    label: 2
  - class: "euk"
    label: 3
  activation: "gelu"
  mode: "training"

  embedding:
    use_embedding_layer: true
    input_type: "translated"
    strands: 2
    frames: 6
    length: null
    input_shape: [6, null]
    embedding_size: 64
    embedding_regularizer: "l2"
    embedding_regularizer_w: 0.00001

  string_processor:
    seq_onehot: False
    codon: "CODON"
    codon_id: "CODON_ID"
    crop_size: 2000
    buffer_size: 10000
    reshuffle_each_iteration: True
    mutate: False
    mutation_rate: 0.1
    shuffle: False
    shuffle_frames: False
    masking: False
    classifier_labels: [0, 1, 2, 3]
    classifier_labels_map: [0, 1, 2, 3]

  representation_learner:
    hidden_layers:
    - name: "masked_conv1d"
      config:
        filters: 32
        kernel_size: 7
        strides: 1
        dilation_rate: 1
        use_bias: true
        activation: null
        kernel_regularizer: "l2"
        kernel_regularizer_w: 0.00001
    - name: "masked_batchnorm"
      config:
        return_nmd: false
    - name: activation
      config:
        activation: gelu
    - name: residual_block
      config:
        use_1x1conv: false
        block_size: 2
        filters: 32
        kernel_size: 3
        use_bias: true
        kernel_regularizer: "l2"
        kernel_regularizer_w: 0.00001
    - name: "masked_batchnorm"
      config:
        return_nmd: false
    - name: activation
      config:
        activation: gelu
    pooling: "average"

  classifier:
    input_shape: 32
    hidden_layers:
    - name: dropout
      config:
        rate: 0.3
    - name: dense
      config:
        units: 4
        activation: null
        dtype: float32
        use_bias: true
        kernel_regularizer: "l2"
        kernel_regularizer_w: 0.01

  # reliability_model disabled for strand test (requires return_nmd)

training:
  data_dir: "/home/yasas-wijesekara/ssd/Projects/Jaeger_revisions/training/genomad_train_data/jaeger_format"
  experiment_root: "experiments/experiment_{{ model.experiment }}_{{ model.seed }}"
  classifier_dir: "{{ model.base_dir }}/{{ training.experiment_root }}/checkpoints/classifier"
  reliability_dir: "{{ model.base_dir }}/{{ training.experiment_root }}/checkpoints/reliability"
  classifier_epochs: 3
  reliability_epochs: 0
  projection_epochs: 0
  classifier_train_steps: 500
  reliability_train_steps: 0
  classifier_validation_steps: 100
  reliability_validation_steps: 0
  batch_size: 32
  optimizer: adam
  optimizer_params:
    learning_rate: 0.001
    clipnorm: 5
  loss_classifier: "categorical_crossentropy"
  loss_params_classifier:
    from_logits: true
  loss_reliability: "binary_crossentropy"
  loss_params_reliability:
    from_logits: true
  metrics_classifier:
  - name: "categorical_accuracy"
    params: null
  metrics_reliability:
  - name: "binary_accuracy"
    params: null
  callbacks:
    clean_old: true
    directories:
    - "{{ model.base_dir }}/{{ training.experiment_root }}/checkpoints/classifier"
    classifier:
    - name: "EarlyStopping"
      params:
        monitor: "val_loss"
        patience: 3
        mode: "min"
        restore_best_weights: true
    - name: "ModelCheckpoint"
      params:
        filepath: "{{ model.base_dir }}/{{ training.experiment_root }}/checkpoints/classifier/epoch:{epoch:02d}-loss:{val_loss:.2f}.weights.h5"
        monitor: "val_loss"
        mode: "min"
        save_weights_only: true
        verbose: 1
        save_best_only: false
    - name: "ReduceLROnPlateau"
      params:
        monitor: "val_loss"
        patience: 2
        factor: 0.5
        min_lr: 0.00001
    - name: "TerminateOnNaN"
    - name: "CSVLogger"
      params:
        filename: "{{ model.base_dir }}/{{ training.experiment_root }}/checkpoints/classifier/training.log"
        separator: ","
        append: true
  model_saving:
    path: "{{ model.base_dir }}/{{ training.experiment_root }}/model"
    save_weights: true
    save_exec_graph: true

  fragment_classifier_data:
    train:
    - class: ["chromosome", "virus", "plasmid", "euk"]
      path:
      - "{{ training.data_dir }}/train.csv"
      label: [0, 1, 2, 3]
    validation:
    - class: ["chromosome", "virus", "plasmid", "euk"]
      path:
      - "{{ training.data_dir }}/val.csv"
      label: [0, 1, 2, 3]

  # fragment_reliability_data disabled for strand test
