name: Bioconda Recipe Update

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.26.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-bioconda-recipe:
    name: Update Bioconda Recipe
    runs-on: ubuntu-latest
    # Only trigger from the canonical repository
    if: github.repository == 'Yasas1994/Jaeger'
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Compute SHA256 of PyPI source tarball
        id: sha256
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NAME="jaeger-bio"
          URL="https://pypi.io/packages/source/${NAME:0:1}/${NAME}/${NAME}-${VERSION}.tar.gz"
          echo "Downloading $URL ..."
          SHA256=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA256"

      - name: Checkout bioconda-recipes fork
        uses: actions/checkout@v4
        with:
          # Check out the user's fork, not the upstream repo
          repository: ${{ github.repository_owner }}/bioconda-recipes
          token: ${{ secrets.BIOCONDA_BOT_TOKEN }}
          path: bioconda-recipes

      - name: Configure git and sync with upstream
        working-directory: bioconda-recipes
        env:
          TOKEN: ${{ secrets.BIOCONDA_BOT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Explicitly set origin to the user's fork with token auth
          git remote set-url origin "https://${TOKEN}@github.com/${GITHUB_REPOSITORY_OWNER}/bioconda-recipes.git"

          # Add upstream remote and fetch latest master
          git remote add upstream https://github.com/bioconda/bioconda-recipes.git
          git fetch upstream master

      - name: Update recipe
        working-directory: bioconda-recipes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NAME="jaeger-bio"
          SHA256="${{ steps.sha256.outputs.sha256 }}"
          RECIPE_DIR="recipes/${NAME}"

          # Create branch from upstream/master
          BRANCH="bump-${NAME}-${VERSION}"
          git checkout -b "${BRANCH}" upstream/master

          # Update version and sha256 in meta.yaml
          sed -i "s/{% set version = \"[^\"]*\" %}/{% set version = \"${VERSION}\" %}/" "${RECIPE_DIR}/meta.yaml"
          sed -i "s/sha256: .*/sha256: ${SHA256}/" "${RECIPE_DIR}/meta.yaml"

          git add "${RECIPE_DIR}/meta.yaml"
          git commit -m "Bump ${NAME} to ${VERSION}"

      - name: Push branch to fork and open PR
        working-directory: bioconda-recipes
        env:
          GH_TOKEN: ${{ secrets.BIOCONDA_BOT_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NAME="jaeger-bio"
          BRANCH="bump-${NAME}-${VERSION}"

          # Push branch to the user's fork (origin = fork)
          git push origin "${BRANCH}"

          # Open PR via GitHub CLI
          gh pr create \
            --repo bioconda/bioconda-recipes \
            --title "Bump ${NAME} to ${VERSION}" \
            --body "Automated Bioconda recipe update triggered by the ${NAME} ${VERSION} release." \
            --head "${GITHUB_REPOSITORY_OWNER}:${BRANCH}" \
            --base master

      - name: Upload recipe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bioconda-recipe-${{ steps.version.outputs.version }}
          path: bioconda-recipes/recipes/jaeger-bio/meta.yaml
