name: Tests

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run ruff check
        run: ruff check src/jaeger

      - name: Run ruff format check
        run: ruff format --check src/jaeger

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest click
          # Install jaeger with CPU tensorflow (lighter for CI)
          python -m pip install -e ".[cpu]"

      - name: Run pytest suite
        run: |
          python -m pytest tests/pytest/ -v --tb=short

      - name: Run smoke tests
        run: |
          python tests/smoke/convert_test.py
          python tests/smoke/layers.test.py
          python tests/smoke/loss_test.py
          python tests/smoke/train_test.py

      - name: Test CLI health command
        run: |
          jaeger health --help

      - name: Build wheel and verify data files
        run: |
          python -m pip install build
          python -m build
          python -m pytest tests/pytest/test_pyproject.py -v --tb=short
