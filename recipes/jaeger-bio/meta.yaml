{% set name = "jaeger-bio" %}
{% set version = "1.26.4" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz"
  # NOTE: update sha256 after releasing to PyPI
  sha256: 262a896fd7254f30461155ab0157f75a350c3f2b9f7ad38c082273981af32dd7

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"
  run_exports:
    - {{ pin_subpackage('jaeger-bio', max_pin="x.x.x") }}
  noarch: python

requirements:
  host:
    - python >=3.11,<3.14
    - pip
    - setuptools
    - pdm-backend
  run:
    - python >=3.11,<3.14
    - pip
    # Core dependencies synced from pyproject.toml
    - tensorflow
    - keras >=3.12.0
    - h5py >=3.0
    - joblib >=1.0
    - kneed >=0.8.5
    - matplotlib-base >=3.7
    - numpy >=1.24
    - pandas >=2.2.3
    - polars >=1.2.6
    - parasail-python ==1.3.4
    - progressbar2 >=4.4.2
    - psutil >=7.0.0
    - click >=8.1
    - pycirclize
    - pyfastx >=2
    - requests >=2.0
    - rich >=13.0
    - ruptures >=1.1.9
    - scikit-learn >=1.6.0
    - scipy >=1.10
    - seaborn >=0.13.0
    - pyyaml >=6.0.2
    - jinja2 >=3.1
    - pydustmasker >=1.0.3
    # Optional: for ONNX inference and quantization
    # - onnxruntime-gpu >=1.26
    # - tf2onnx >=1.17
    # - sympy >=1.13
    # - onnx >=1.16

test:
  imports:
    - jaeger
    - jaeger.data
    - jaeger.nnlib

  commands:
    - jaeger --help
    - jaeger predict --help

about:
  home: "https://github.com/Yasas1994/Jaeger"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "A quick and precise pipeline for detecting phages in sequence assemblies."
  dev_url: https://github.com/Yasas1994/Jaeger
  doc_url: https://jaeger-docs.readthedocs.io/

extra:
  identifiers:
    - biotools:jaeger
  recipe-maintainers:
    - Yasas1994
