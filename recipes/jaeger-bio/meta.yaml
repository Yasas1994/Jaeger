{% set name = "jaeger-bio" %}
{% set version = "1.26.3" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz"
  sha256: 4cd0bdf87f4f52731d46508d7cd4852dd9dc6b2eab1e75dd14ed423dab333a07

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"
  run_exports:
    - {{ pin_subpackage('jaeger-bio', max_pin="x.x.x") }}
  noarch: python

requirements:
  host:
    - python >=3.11,<3.13
    - pip
    - setuptools
    - pdm-backend
  run:
    - python >=3.11,<3.13
    - pip
    # Core dependencies synced from pyproject.toml
    - keras >=3.12.0
    - kneed >=0.8.5
    - matplotlib-base >=3.7
    - pandas >=2.2.3
    - polars >=1.2.6
    - parasail-python ==1.3.4
    - progressbar2 >=4.4.2
    - psutil >=7.0.0
    - click >=8.1
    - pycirclize
    - pyfastx >=2
    - ruptures >=1.1.9
    - scikit-learn >=1.6.0
    - pyyaml >=6.0.2
    - jinja2 >=3.1
    - pydustmasker >=1.0.3

test:
  imports:
    - jaeger
    - jaeger.data
    - jaeger.nnlib

  commands:
    - jaeger --help
    - jaeger predict --help

about:
  home: "https://github.com/Yasas1994/Jaeger"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "A quick and precise pipeline for detecting phages in sequence assemblies."
  dev_url: https://github.com/Yasas1994/Jaeger
  doc_url: https://jaeger-docs.readthedocs.io/

extra:
  identifiers:
    - biotools:jaeger
  recipe-maintainers:
    - Yasas1994
