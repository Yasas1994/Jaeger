{% set name = "jaeger-bio" %}
{% set version = "1.26.2" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: b890227e03f123d5bc3d8f29269f5256079fe4dfd87ec22d85da9206e18e46eb

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"
  run_exports:
    - {{ pin_subpackage('jaeger-bio', max_pin="x.x.x") }}
  noarch: python

requirements:
  host:
    - python >=3.11,<3.13
    - pip
    - setuptools
  run:
    - python >=3.11,<3.13
    - pip
    # Compiled/binary dependencies — must be conda packages
    - tensorflow >=2.18,<2.19
    - parasail-python >=1.3.4
    - pyfastx >=2
    - psutil >=7.0.0
    - h5py >=3.8
    - numpy >=1.24
    - scikit-learn >=1.6.0
    # Pure-python dependencies with version constraints
    - click >=8.1
    - keras >=3.12.0
    - matplotlib-base >=3.7
    - pandas >=2.2.3
    - pyyaml >=6.0.2
    - ruptures >=1.1.9

test:
  imports:
    - jaeger
    - jaeger.data
    - jaeger.nnlib

  commands:
    - jaeger --help

about:
  home: "https://github.com/Yasas1994/Jaeger"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "A quick and precise pipeline for detecting phages in sequence assemblies."
  dev_url: https://github.com/Yasas1994/Jaeger
  doc_url: https://jaeger-docs.readthedocs.io/

extra:
  identifiers:
    - biotools:jaeger
  recipe-maintainers:
    - Yasas1994
